<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="ViSell - Login" />
    <meta name="theme-color" content="#262626" />
    <title>VISELL - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        
    <div class="page">
        <div class="page__main">
            <div class="login-container">
                <div class="login-box">
                    
                    <img class="navbar__logo2" src="logo3.png" alt="ViSell Logo" />
                   
                    
                    <form class="login-form" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="Enter your email"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password"
                                required
                            />
                        </div>

                        <div class="form-group checkbox">
                            <input 
                                type="checkbox" 
                                id="remember" 
                                name="remember"
                            />
                            <label for="remember">Remember me</label>
                        </div>

                        <button type="submit" class="login-btn">Login</button>
                    </form>

                    <div class="login-footer">
                        <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
                        <p><a href="#forgot-password">Forgot your password?</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="page__footer">
        <div class="footer">
            <div class="wrapper">
                <div class="footer__inner">
                    <div class="footer__bottom">
                        <ul class="footer__list footer__list--bottom">
                            <li class="footer__list-item">
                                <div class="footer__copy">&copy; 2024 ViSell. All rights reserved.</div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                alert('Welcome back!');
                window.location.href = 'vis3ll2.html';
            }
        }

    </script>
</body>
</html>
